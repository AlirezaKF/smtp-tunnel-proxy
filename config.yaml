# SMTP Tunnel Configuration
# Copy this file and customize for your setup

# ============================================================================
# Server Configuration (for server.py)
# ============================================================================
server:
  # Listen address (0.0.0.0 for all interfaces)
  host: "0.0.0.0"

  # SMTP submission port (587 is standard)
  port: 587

  # Hostname to advertise in SMTP greeting
  # Use a realistic hostname that matches your server's DNS
  hostname: "mail.example.com"

  # TLS certificate and key files
  # Generate with: python generate_certs.py --hostname mail.example.com
  cert_file: "server.crt"
  key_file: "server.key"

  # Users configuration file
  # Contains user secrets, IP whitelists, and logging settings
  users_file: "users.yaml"

  # Global logging setting (can be overridden per-user)
  log_users: true

# ============================================================================
# Client Configuration (for client.py)
# This section is used when generating client packages
# ============================================================================
client:
  # Tunnel server domain name (FQDN required for certificate verification)
  # Use a domain name, not an IP address - see README for free DNS options
  server_host: "mail.example.com"

  # Tunnel server port
  server_port: 587

  # Local SOCKS5 proxy port
  socks_port: 1080

  # Local SOCKS5 bind address (127.0.0.1 = localhost only)
  socks_host: "127.0.0.1"

  # Username and secret are set per-user in generated client configs
  # username: "set-by-adduser"
  # secret: "set-by-adduser"

  # CA certificate for server verification (RECOMMENDED for security)
  ca_cert: "ca.crt"

# ============================================================================
# Tunnel Runtime Configuration - Optional
# ============================================================================
tunnel:
  # Application-level keepalive. Set to 0 to disable for mixed-version deployments.
  keepalive_interval: 45

  # Seconds to wait for a keepalive acknowledgement before reconnect/close.
  keepalive_timeout: 120

  # Reconnect backoff used by client.py after failures or disconnects.
  reconnect_initial_delay: 2
  reconnect_max_delay: 60

  # Jitter ratio for reconnect delay. 0.35 means +/-35%.
  reconnect_jitter: 0.35

# ============================================================================
# SMTP Compatibility Configuration - Optional
# ============================================================================
smtp:
  # EHLO name sent by the client during the SMTP-like handshake.
  # Existing configs fall back to "tunnel-client.local".
  ehlo_name: "client.local"

# ============================================================================
# Reverse Mode Examples - Optional
# ============================================================================
# Normal mode remains the default. To enable true reverse mode:
#
# Access Node / Iran-side (client.py):
#
# client:
#   mode: reverse-listen
#   socks_host: "127.0.0.1"
#   socks_port: 1080
#   reverse:
#     listen_host: "0.0.0.0"
#     listen_port: 587
#     auth_username: "reverse1"
#     auth_secret_file: "/etc/smtp-tunnel/reverse.secret"
#     allowed_dialer_ips:
#       - "VPS_PUBLIC_IP"
#     tls:
#       cert_mode: "letsencrypt"   # letsencrypt | existing | private-ca
#       domain: "access.example.com"
#       cert_file: "/etc/letsencrypt/live/access.example.com/fullchain.pem"
#       key_file: "/etc/letsencrypt/live/access.example.com/privkey.pem"
#       letsencrypt_email: "admin@example.com"
#       letsencrypt_challenge: "http-01"  # http-01 | dns-01 | manual
#       auto_renew: true
#     mtls:
#       enabled: false  # planned for Stage 1b
#
# Exit Node / VPS (server.py):
#
# server:
#   mode: reverse-dial
#   reverse:
#     access_host: "access.example.com"
#     access_port: 587
#     tls_server_name: "access.example.com"
#     auth_username: "reverse1"
#     auth_secret_file: "/etc/smtp-tunnel/reverse.secret"
#     tls:
#       verify_mode: "system-ca"  # system-ca | private-ca | fingerprint
#       ca_cert: null
#       cert_fingerprint_sha256: null
#     mtls:
#       enabled: false  # planned for Stage 1b

# ============================================================================
# Stealth Configuration (DPI Evasion) - Optional
# ============================================================================
stealth:
  # Random delay range between messages (milliseconds)
  min_delay_ms: 50
  max_delay_ms: 500

  # Pad messages to these sizes (bytes)
  pad_to_sizes:
    - 4096
    - 8192
    - 16384

  # Probability of sending dummy (empty) messages
  dummy_message_probability: 0.1
